<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すくば市消防本部 指令台システム - マルチ出動管理版</title>
    <style>
        body {
            background-color: #f5f5f5;
            font-family: "MS UI Gothic", "MS PGothic", -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 8px;
            height: 100vh;
            color: #000000;
            overflow: hidden;
        }

        /* 5列均等テーブル */
        .grid-table {
            width: 100%;
            height: 42%;
            border-collapse: separate;
            border-spacing: 3px;
            background-color: #ffffff;
            border: 2px solid #bbbbbb;
            margin-bottom: 8px;
            table-layout: fixed;
        }

        .cell {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #cccccc;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            font-size: 13px; 
            font-weight: bold;
            padding: 4px;
            word-break: break-all;
        }

        .cell-station {
            background-color: #e0e0e0;
            color: #000000;
            cursor: default;
            border: 1px solid #999999;
            font-size: 14px;
        }

        /* 出動選択中の赤点滅 */
        .cell.active {
            background-color: #ff3333 !important;
            color: #ffffff !important;
            animation: blinkEffect 0.5s infinite alternate;
            -webkit-animation: blinkEffect 0.5s infinite alternate;
        }

        @keyframes blinkEffect {
            from { background-color: #ff3333; }
            to { background-color: #a00000; }
        }
        @-webkit-keyframes blinkEffect {
            from { background-color: #ff3333; }
            to { background-color: #a00000; }
        }

        /* 下部エリア */
        .lower-container {
            height: 54%;
            display: flex;
            display: -webkit-flex;
            gap: 8px;
        }

        .map-area {
            width: 35%;
            background-color: #e0e0e0;
            border: 2px solid #bbbbbb;
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        
        .map-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #ccc;
        }
        
        .map-controls {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: #ffffff;
            padding: 4px 8px;
            border: 1px solid #999;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .controls-panel {
            width: 65%;
            flex-grow: 1;
            background-color: #ffffff;
            border: 2px solid #bbbbbb;
            padding: 10px;
        }

        .form-row {
            margin-bottom: 6px;
            overflow: hidden;
        }

        .setting-item {
            float: left;
            width: 48%;
            margin-right: 2%;
        }

        .setting-item.wide {
            width: 100%;
            float: none;
            clear: both;
        }

        .label-text {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 2px;
        }

        select, input {
            padding: 6px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #bbbbbb;
            background: white;
            color: #000000;
            width: 100%;
        }

        .credit-area {
            text-align: right;
            font-size: 11px;
            color: #777777;
            font-weight: bold;
            margin-top: 2px;
            margin-bottom: 4px;
            clear: both;
        }

        .credit-area a {
            color: #0066cc;
            text-decoration: none;
        }

        /* 司令停止ボタンと出動決定ボタンの並び用 */
        .btn-container {
            width: 100%;
            overflow: hidden;
        }

        .btn-stop {
            background-color: #ffe6e6;
            color: #cc0000;
            border: 4px solid #cc0000;
            width: 35%;
            height: 65px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            float: left;
            margin-right: 3%;
        }

        .btn-dispatch {
            background-color: #ffffff;
            color: #000000;
            border: 4px solid #666666;
            width: 62%;
            height: 65px;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            float: left;
        }
    </style>
</head>
<body>

<audio id="snd-sirei" src="sirei.mp3" preload="auto"></audio>
<audio id="snd-kyukyu" src="kyukyu.mp3" preload="auto"></audio>
<audio id="snd-kasai" src="kasaisirei.mp3" preload="auto"></audio>

<table class="grid-table" id="grid-table"></table>

<div class="lower-container">
    <div class="map-area">
        <img id="map-display" src="https://cyberjapandata.gsi.go.jp/xyz/std/12/3638/1614.png" alt="地図" class="map-img">
        <label class="map-controls">
            地図画像を選択
            <input type="file" id="map-input" accept="image/*" style="display:none;" onchange="loadCustomMap(this)">
        </label>
    </div>

    <div class="controls-panel">
        <div class="form-row">
            <div class="setting-item">
                <span class="label-text">司令区分</span>
                <select id="cmdType">
                    <option value="火災司令">火災司令</option>
                    <option value="救急司令">救急司令</option>
                    <option value="救助司令">救助司令</option>
                    <option value="災害司令">災害司令</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div class="setting-item">
                <span class="label-text">町名・場所</span>
                <select id="townName">
                    <option value="学園都市">学園都市</option>
                    <option value="蔓崎">蔓崎</option>
                    <option value="研究学園都市">研究学園都市</option>
                    <option value="新都市中央通り">新都市中央通り</option>
                    <option value="すくば駅通り">すくば駅通り</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="setting-item">
                <span class="label-text">丁目</span>
                <select id="blockNum">
                    <option value="">（なし）</option>
                    <option value="一丁目">一丁目</option>
                    <option value="二丁目">二丁目</option>
                    <option value="三丁目">三丁目</option>
                    <option value="四丁目">四丁目</option>
                    <option value="五丁目">五丁目</option>
                </select>
            </div>
            <div class="setting-item">
                <span class="label-text">付加情報</span>
                <select id="nearBy">
                    <option value="">（なし）</option>
                    <option value="付近">付近</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="setting-item wide">
                <span class="label-text">自由入力詳細</span>
                <input type="text" id="freeText" placeholder="内容を入力">
            </div>
        </div>

        <div class="credit-area">
            指令音素材提供：<a href="https://pocket-se.info/" target="_blank">ポケットサウンド/効果音素材</a>
        </div>

        <div class="btn-container">
            <button class="btn-stop" onclick="stopDispatchPrompt()">司令停止</button>
            <button class="btn-dispatch" onclick="startDispatch()">出動決定</button>
        </div>
    </div>
</div>

<script>
    var data = [
        {
            station: "中央署",
            units: ["高度救助隊11", "高度救助隊12", "第一救急隊 14", "第二救急隊 8", "中央タンク34", "中央ポンプ4", "中央指揮2"]
        },
        {
            station: "並木分署",
            units: ["並木指揮6", "並木ポンプ64", "並木高度救助隊 13", "並木タンク9", "並木第一救急隊 16", "並木第二救急隊 14"]
        }
    ];

    // 出動情報を記憶するグローバル変数（95/XP対応のため古代のオブジェクト配列構造）
    var dispatchCount = 0; // 全体の通算出動命令カウント
    var activeDispatches = {}; // 現在出動中の事案データストレージ
    
    // 事案番号に応じた色定義
    var colorList = [
        '#0044cc', // 1回目：青
        '#008800', // 2回目：緑
        '#ff6600', // 3回目：オレンジ
        '#ddcc00'  // 4回目：黄色
    ];

    var table = document.getElementById('grid-table');
    
    // テーブルの生成
    for (var g = 0; g < data.length; g++) {
        var group = data[g];
        var allCells = [];
        allCells.push({ text: group.station, isStation: true });
        for (var u = 0; u < group.units.length; u++) {
            allCells.push({ text: group.units[u], isStation: false });
        }
        var fill = 5 - (allCells.length % 5);
        if (fill < 5 && fill > 0) {
            for (var f = 0; f < fill; f++) {
                allCells.push({ text: "", isStation: false, isEmpty: true });
            }
        }
        
        var currentRow;
        for (var i = 0; i < allCells.length; i++) {
            if (i % 5 === 0) {
                currentRow = table.insertRow(-1);
                currentRow.style.height = "50px";
            }
            var cellData = allCells[i];
            var td = currentRow.insertCell(-1);
            td.className = "cell";
            td.innerHTML = cellData.text;
            
            if (cellData.isStation) {
                td.className = "cell cell-station";
            } else if (cellData.isEmpty) {
                td.style.backgroundColor = "#fafafa";
                td.style.border = "1px dashed #eee";
                td.style.cursor = "default";
            } else {
                td.onclick = (function(targetTd) {
                    return function() {
                        if (window.speechSynthesis) window.speechSynthesis.cancel();
                        try {
                            document.getElementById('snd-sirei').play().catch(function(){});
                            document.getElementById('snd-sirei').pause();
                        } catch(e) {}
                        
                        // すでに出動中（色の属性がついている）なら何もしない（停止ボタンから一括帰署させるため）
                        if (targetTd.getAttribute('data-dispatch-id')) {
                            return;
                        }
                        
                        if (targetTd.className.indexOf('active') !== -1) {
                            targetTd.className = "cell";
                        } else {
                            targetTd.className = "cell active";
                        }
                    };
                })(td);
            }
        }
    }

    function loadCustomMap(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('map-display').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function startDispatch() {
        var allTds = table.getElementsByTagName('td');
        var selectedElements = [];
        var selectedUnits = [];
        
        for (var d = 0; d < allTds.length; d++) {
            if (allTds[d].className.indexOf('active') !== -1) {
                selectedElements.push(allTds[d]);
                selectedUnits.push(allTds[d].innerText || allTds[d].textContent || "");
            }
        }
        
        if (selectedUnits.length === 0) return;

        dispatchCount++; // 出動カウントを1進める（1からスタート）
        var colorIndex = (dispatchCount - 1) % 4; // 1~4回目で色ループ
        var dispatchColor = colorList[colorIndex];

        var cmd = document.getElementById('cmdType').value;
        var town = document.getElementById('townName').value;
        var block = document.getElementById('blockNum').value;
        var near = document.getElementById('nearBy').value;
        var free = document.getElementById('freeText').value;

        var address = "すくば市、" + town + "、" + block + near;
        var speechText = cmd + "。" + address + "。" + free + "。出動部隊、" + selectedUnits.join("、") + "。以上。";

        // この事案のデータを保存（帰署キャンセル用）
        var cleanCmdName = cmd.replace("司令", ""); // 「火災」「救急」にする
        activeDispatches[dispatchCount] = {
            label: cleanCmdName + dispatchCount + "回目 (" + selectedUnits.join(",") + ")",
            elements: selectedElements
        };

        var audioSirei = document.getElementById('snd-sirei');
        var audioKyukyu = document.getElementById('snd-kyukyu');
        var audioKasai = document.getElementById('snd-kasai');
        
        try {
            audioSirei.pause(); audioSirei.currentTime = 0;
            audioKyukyu.pause(); audioKyukyu.currentTime = 0;
            audioKasai.pause(); audioKasai.currentTime = 0;
        } catch(e) {}

        if (window.speechSynthesis) window.speechSynthesis.cancel();

        var activeAudio = audioSirei;
        if (cmd === "救急司令") {
            activeAudio = audioKyukyu;
        } else if (cmd === "救助司令" || cmd === "災害司令") {
            activeAudio = audioKasai;
        }

        try {
            activeAudio.play().then(function() {
                activeAudio.onended = function() {
                    playSpeech(speechText);
                };
            }).catch(function(err) {
                playSpeech(speechText);
            });
        } catch(e) {
            playSpeech(speechText);
        }

        // 部隊を事案ごとの指定色に染める
        for (var s = 0; s < selectedElements.length; s++) {
            var el = selectedElements[s];
            el.className = "cell"; 
            el.style.backgroundColor = dispatchColor;
            el.style.color = '#ffffff';
            el.setAttribute('data-dispatch-id', dispatchCount); // 何回目の出動かマーキング
        }
    }

    function playSpeech(text) {
        if ('speechSynthesis' in window) {
            var uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 1.25;
            window.speechSynthesis.speak(uttr);
        }
    }

    // 【新機能】司令停止（帰署確認）プロンプト処理
    function stopDispatchPrompt() {
        var keys = [];
        for (var k in activeDispatches) {
            if (activeDispatches.hasOwnProperty(k)) {
                keys.push(k);
            }
        }

        if (keys.length === 0) {
            alert("現在、出動中の部隊はありません。");
            return;
        }

        // 選択肢のメッセージを組み立てる
        var message = "何回目の出動を停止させますか？\n現在出動中の事案一覧：\n\n";
        for (var i = 0; i < keys.length; i++) {
            var id = keys[i];
            message += "[" + id + "] " + activeDispatches[id].label + "\n";
        }
        message += "\n停止させたい事案の【番号のみ】を入力してください。";

        var inputId = prompt(message, "");
        
        if (inputId === null || inputId === "") return; // キャンセルされた場合

        // 入力された番号の事案が存在するかチェック
        if (activeDispatches[inputId]) {
            var elementsToReset = activeDispatches[inputId].elements;
            
            // 対象部隊をすべて通常（白）に戻す
            for (var r = 0; r < elementsToReset.length; r++) {
                var el = elementsToReset[r];
                el.style.backgroundColor = '#ffffff';
                el.style.color = '#000000';
                el.removeAttribute('data-dispatch-id');
            }
            
            // 管理リストから削除
            delete activeDispatches[inputId];
            alert(inputId + "回目の出動部隊の帰署を確認。運用表示盤を通常に戻しました。");
        } else {
            alert("入力された事案番号が見つかりません。正しい半角数字を入力してください。");
        }
    }
</script>
</body>
</html>
