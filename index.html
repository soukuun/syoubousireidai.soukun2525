<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すくば市消防本部 指令台システム - 完全統合版</title>
    <style>
        body { background-color: #f5f5f5; font-family: "MS UI Gothic", sans-serif; margin: 0; padding: 8px; height: 100vh; overflow: hidden; }
        #toggle-update-btn { position: absolute; top: 5px; right: 5px; z-index: 100001; font-size: 10px; background: #e1e1e1; border: 1px solid #999; cursor: pointer; padding: 2px 5px; font-weight: bold; }
        #update-panel {
            position: absolute; top: 30px; right: 10px; background: rgba(0,0,0,0.9); 
            padding: 10px; border: 2px solid #ff3333; z-index: 100000; color: white; display: none;
            width: 320px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #update-panel textarea { width: 93%; height: 180px; background: #111; color: #00ff00; font-family: monospace; font-size: 11px; padding: 5px; border: 1px solid #555; }
        #update-panel button { margin-top: 5px; width: 100%; background: #ff3333; color: white; font-weight: bold; padding: 8px; cursor: pointer; border: none; }
        #app-frame { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<button id="toggle-update-btn" onclick="toggleUpdatePanel()">⚙️ コード更新画面を開く</button>

<div id="update-panel">
    <div style="font-size:12px; font-weight:bold; margin-bottom:5px;">🤖 今後コードを追加するときはここに貼り付け</div>
    <textarea id="code-input" placeholder="新しいHTMLをここに全部貼り付け..."></textarea>
    <button onclick="applyNewCode()">システム更新（アップデート）</button>
</div>

<iframe id="app-frame"></iframe>

<script>
    window.onload = function() {
        var baseCode = document.getElementById('initial-code').textContent;
        updateFrame(baseCode);
    };

    function toggleUpdatePanel() {
        var panel = document.getElementById('update-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function applyNewCode() {
        var newCode = document.getElementById('code-input').value;
        if(!newCode.trim()) { alert("コードが入力されていません"); return; }
        updateFrame(newCode);
        document.getElementById('code-input').value = "";
        toggleUpdatePanel();
    }

    function updateFrame(htmlContent) {
        var frame = document.getElementById('app-frame');
        var dst = frame.contentDocument || frame.contentWindow.document;
        dst.open(); dst.write(htmlContent); dst.close();
    }
</script>

<script type="text/plain" id="initial-code">
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #f5f5f5;
            font-family: "MS UI Gothic", "MS PGothic", sans-serif;
            margin: 0; padding: 8px; height: 100vh; color: #000000; overflow: hidden; position: relative;
        }
        .grid-table {
            width: 100%; height: 35%; border-collapse: separate; border-spacing: 3px;
            background-color: #ffffff; border: 2px solid #bbbbbb; margin-bottom: 4px; table-layout: fixed;
        }
        .cell {
            background-color: #ffffff; color: #000000; border: 1px solid #cccccc;
            text-align: center; vertical-align: middle; cursor: pointer;
            font-size: 11px; font-weight: bold; padding: 4px; word-break: break-all;
        }
        .cell-station { background-color: #e0e0e0; color: #000000; cursor: default; border: 1px solid #999999; font-size: 12px; }
        .cell.active {
            background-color: #ff3333 !important; color: #ffffff !important;
            animation: blinkEffect 0.5s infinite alternate;
        }
        @keyframes blinkEffect { from { background-color: #ff3333; } to { background-color: #a00000; } }
        
        .lower-container { height: 63%; display: flex; gap: 8px; }
        .map-area { width: 32%; background-color: #e0e0e0; border: 2px solid #bbbbbb; position: relative; overflow: hidden; text-align: center; }
        .map-img { width: 100%; height: 100%; object-fit: contain; background-color: #ccc; }
        .map-controls { position: absolute; bottom: 5px; left: 5px; background: #ffffff; padding: 4px 8px; border: 1px solid #999; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        .controls-panel { width: 68%; flex-grow: 1; background-color: #ffffff; border: 2px solid #bbbbbb; padding: 6px; display: flex; flex-direction: column; justify-content: space-between; }
        .form-row { margin-bottom: 4px; overflow: hidden; }
        .setting-item { float: left; width: 48%; margin-right: 2%; }
        .label-text { font-size: 11px; font-weight: bold; color: #333; display: block; margin-bottom: 1px; }
        select, input { padding: 4px; font-size: 11px; font-weight: bold; border: 2px solid #bbbbbb; background: white; color: #000000; width: 100%; }
        
        .btn-container { width: 100%; overflow: hidden; margin-bottom: 4px; }
        .btn-stop { background-color: #ffe6e6; color: #cc0000; border: 3px solid #cc0000; width: 25%; height: 38px; font-size: 15px; font-weight: bold; cursor: pointer; float: left; margin-right: 3%; }
        .btn-dispatch { background-color: #ffffff; color: #000000; border: 3px solid #666666; width: 72%; height: 38px; font-size: 18px; font-weight: bold; cursor: pointer; float: left; }
        
        .bottom-sub-panel { border-top: 2px dashed #999999; padding-top: 4px; margin-top: 2px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .panel-section-title { font-size: 11px; font-weight: bold; color: #0044cc; margin-bottom: 2px; border-left: 3px solid #0044cc; padding-left: 5px; }
        
        .info-monitor-screen { background-color: #222222; color: #ffff00; font-family: monospace; font-size: 10px; font-weight: bold; padding: 3px 6px; border: 1px solid #444444; margin-bottom: 4px; }
        .info-monitor-row { display: flex; justify-content: space-between; }
        
        .category-group { display: flex; gap: 4px; margin-bottom: 4px; }
        .btn-cat { flex: 1; height: 24px; font-size: 11px; font-weight: bold; cursor: pointer; background-color: #e1e1e1; border: 1px solid #999999; color: #333333; }
        .btn-cat.selected[data-cat="A+"] { background-color: #ff3333; color: white; border-color: #cc0000; }
        .btn-cat.selected[data-cat="A"] { background-color: #ff9900; color: white; border-color: #d47a00; }
        .btn-cat.selected[data-cat="B"] { background-color: #0088cc; color: white; border-color: #006699; }
        
        .factor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; margin-bottom: 4px; }
        .btn-factor { height: 28px; font-size: 10px; font-weight: bold; background-color: #e6f2ff; border: 1px solid #a6c8ff; color: #003399; cursor: pointer; text-align: center; }
        .btn-factor:active { background-color: #b3d7ff; }
        .btn-factor.fire-factor { background-color: #ffe6e6; border-color: #ffa6a6; color: #990000; }
        
        .dispatch-monitor-screen { background-color: #111111; border: 2px solid #333333; height: 46px; padding: 4px; overflow-y: auto; font-family: monospace; margin-bottom: 4px; }
        .monitor-row { font-size: 11px; font-weight: bold; color: #00ff00; margin-bottom: 2px; border-bottom: 1px solid #222222; line-height: 15px; }
        .btn-arrived { float: right; background-color: #333333; color: #ffff00; border: 1px solid #ffff00; font-size: 9px; font-weight: bold; padding: 0px 4px; cursor: pointer; height: 14px; line-height: 12px; }
        
        .weather-monitor-screen { background-color: #fafafa; color: #333333; font-size: 11px; font-weight: bold; padding: 3px 6px; border: 1px solid #dddddd; }
        
        .server-down-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; color: #ff3333; z-index: 99999; text-align: center; padding-top: 10%; }
        .server-down-msg { font-size: 32px; font-weight: bold; margin-bottom: 20px; animation: textBlink 0.6s infinite alternate; }
        @keyframes textBlink { from { opacity: 1.0; } to { opacity: 0.3; } }
        .
