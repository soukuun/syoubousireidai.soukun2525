<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>すくば市消防本部 指令台システム</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="すくば市指令台">
    <link rel="apple-touch-icon" href="https://cyberjapandata.gsi.go.jp/xyz/std/12/3638/1614.png">
    
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22%E3%81%99%E3%81%8F%E3%81%B0%E5%B8%82%E6%B6%88%E9%98%B2%E6%9C%AC%E9%83%A8%20%E6%8C%87%E4%BB%A4%E5%8F%B0%22,%22short_name%22:%22%E3%81%99%E3%81%8F%E3%81%B0%E5%B8%82%E6%8C%87%E4%BB%A4%E5%8F%B0%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f4f6f9%22,%22theme_color%22:%22%23000000%22}">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            margin: 0; padding: 6px; min-height: 100vh; color: #000000;
            box-sizing: border-box;
            -webkit-user-select: none; user-select: none;
            padding-top: env(safe-area-inset-top);
        }
        
        /* 車両配置図 */
        .grid-table {
            width: 100%; border-collapse: separate; border-spacing: 2px;
            background-color: #ffffff; border: 1px solid #b0b0b0; margin-bottom: 6px; table-layout: fixed;
        }
        .cell {
            background-color: #ffffff; color: #000000; border: 1px solid #d0d0d0;
            text-align: center; vertical-align: middle; cursor: pointer;
            font-size: 11px; font-weight: bold; padding: 6px 2px; word-break: break-all;
            height: 32px;
        }
        .cell-station { background-color: #e6e6e6; color: #000000; cursor: default; border: 1px solid #a0a0a0; font-size: 11px; }
        .cell.active {
            background-color: #ff3333 !important; color: #ffffff !important;
            animation: blinkEffect 0.5s infinite alternate;
        }
        @keyframes blinkEffect { from { background-color: #ff3333; } to { background-color: #900000; } }
        
        /* 縦並びレイアウト */
        .lower-container { display: flex; flex-direction: column; gap: 6px; }
        
        /* 地図エリア */
        .map-area { width: 100%; height: 160px; background-color: #d8d8d8; border: 1px solid #b0b0b0; position: relative; text-align: center; }
        .map-img { width: 100%; height: 100%; object-fit: cover; }
        .map-controls { position: absolute; bottom: 5px; left: 5px; background: rgba(255,255,255,0.9); padding: 4px 8px; border: 1px solid #999; font-size: 11px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        /* 手書き指令メモ盤エリア */
        .memo-pad-area {
            width: 100%; background-color: #222222; border: 2px solid #4472c4;
            border-radius: 4px; padding: 4px; box-sizing: border-box; position: relative;
        }
        .memo-title-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 4px; padding: 0 4px;
        }
        .memo-title { color: #ffff00; font-size: 11px; font-weight: bold; }
        .btn-clear-memo {
            background-color: #ff3333; color: white; border: none; font-size: 10px;
            font-weight: bold; padding: 2px 8px; border-radius: 3px; cursor: pointer;
        }
        #memo-canvas {
            background-color: #000000; width: 100%; height: 80px;
            border: 1px solid #555; display: block; touch-action: none;
        }

        .controls-panel { width: 100%; background-color: #ffffff; border: 1px solid #b0b0b0; padding: 6px; box-sizing: border-box; border-radius: 4px; }
        
        /* 通報者情報エリア */
        .caller-info-bar {
            background-color: #dae3f3; padding: 6px; border: 1px solid #aebeea; margin-bottom: 6px; font-size: 11px; border-radius: 4px;
        }
        .info-input-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
        .info-label { background: #b4c6e7; padding: 3px 4px; font-weight: bold; width: 65px; text-align: center; border: 1px solid #8faadc; font-size: 10px; border-radius: 2px; }
        .info-val-box { background: white; border: 1px solid #a6a6a6; padding: 3px 4px; flex-grow: 1; font-weight: bold; font-size: 11px; min-height: 16px; border-radius: 2px; }

        /* 入力エリア */
        .form-row { margin-bottom: 6px; display: flex; gap: 6px; }
        .setting-item { flex: 1; }
        .label-text { font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 2px; }
        select, input { padding: 6px; font-size: 12px; font-weight: bold; border: 1px solid #a6a6a6; background: white; color: #000000; width: 100%; box-sizing: border-box; border-radius: 4px; -webkit-appearance: none; appearance: none; }
        
        /* ✍️ 空いたスペースに作った常設のクイック文字打ちエリア */
        .quick-input-box {
            background-color: #f8f9fa; border: 1px solid #95a5a6; padding: 6px; 
            margin-bottom: 6px; border-radius: 4px; box-sizing: border-box;
        }
        .quick-input-box input {
            font-size: 13px; padding: 6px; border: 2px solid #7f8c8d; background-color: #ffffff;
        }

        /* ボタンエリア */
        .btn-container { width: 100%; display: flex; gap: 6px; margin-top: 4px; margin-bottom: 6px; }
        .btn-stop { background-color: #fce4d6; color: #c65911; border: 2px solid #c65911; width: 30%; height: 44px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-dispatch { background-color: #ffffff; color: #000000; border: 2px solid #595959; width: 70%; height: 44px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .bottom-sub-panel { border-top: 1px dashed #b0b0b0; padding-top: 6px; }
        
        /* 見出しタイトル */
        .drama-section-title { font-size: 14px; font-weight: bold; color: #333333; margin: 4px 0; border-bottom: 2px solid #4472c4; padding-bottom: 2px; }
        .drama-sub-title { font-size: 11px; font-weight: bold; color: #555555; margin: 4px 0 6px 0; }
        
        /* カテゴリー選択 */
        .category-group { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
        .cat-label-inline { font-size: 12px; font-weight: bold; color: #333; width: 90px; }
        .btn-cat { width: 70px; height: 32px; font-size: 13px; font-weight: bold; cursor: pointer; background-color: #d9d9d9; border: 1px solid #a6a6a6; color: #000000; border-radius: 4px; }
        .btn-cat.selected { background-color: #8faadc; border-color: #4472c4; color: #000000; box-shadow: inset 0 0 4px rgba(0,0,0,0.2); }
        
        /* 要因因子3列グリッド */
        .factor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 6px; }
        .btn-factor {
            height: 44px; font-size: 13px; font-weight: bold; 
            background-color: #dae3f3; border: 1px solid #4472c4; color: #000000; 
            cursor: pointer; text-align: center; box-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        .btn-factor:active { background-color: #b4c6e7; }
        .btn-factor.fire-factor { background-color: #fce4d6; border-color: #c65911; }
        
        /* タイマーモニター */
        .dispatch-monitor-screen { background-color: #111111; border: 1px solid #333; min-height: 44px; padding: 6px; overflow-y: auto; font-family: monospace; margin-bottom: 6px; border-radius: 4px; }
        .monitor-row { font-size: 12px; font-weight: bold; color: #00ff00; margin-bottom: 2px; line-height: 16px; display: flex; justify-content: space-between; align-items: center; }
        .btn-arrived { background-color: #333; color: #ffff00; border: 1px solid #ffff00; font-size: 11px; padding: 4px 8px; cursor: pointer; border-radius: 4px; }

        /* 気象盤 */
        .weather-monitor-screen { background-color: #f2f2f2; color: #333; font-size: 10px; font-weight: bold; padding: 4px 6px; border: 1px solid #d9d9d9; display: flex; justify-content: space-between; border-radius: 4px; }
        
        /* システムダウン */
        .server-down-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; color: #ff3333; z-index: 99999; text-align: center; padding-top: 20%; box-sizing: border-box; }
        .puzzle-box { background-color: #111111; border: 2px solid #ff3333; width: 280px; margin: 0 auto; padding: 15px; color: #ffffff; border-radius: 6px; }
        .puzzle-question { font-size: 24px; font-weight: bold; color: #ffff00; margin-bottom: 10px; }
        .puzzle-input { width: 120px; font-size: 20px; padding: 4px; text-align: center; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; }
    </style>
</head>
<body>

<div id="system-down-overlay" class="server-down-screen">
    <div style="font-size:22px; font-weight:bold; margin-bottom:15px;">🚨司令システムダウン🚨</div>
    <div class="puzzle-box">
        <div style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">【緊急復旧バイパス演算】</div>
        <div id="puzzle-q-display" class="puzzle-question">3 × 2 = ?</div>
        <form onsubmit="checkPuzzleAnswer(); return false;" style="margin:0;">
            <input type="number" id="puzzle-ans-input" class="puzzle-input" pattern="[0-9]*" inputmode="numeric" autocomplete="off">
            <div style="margin-top: 10px;">
                <button type="button" style="padding:6px 16px; background:#ff3333; color:white; border:none; font-weight:bold; border-radius:4px;" onclick="checkPuzzleAnswer()">送信</button>
            </div>
        </form>
    </div>
</div>

<audio id="snd-sirei" src="sirei.mp3" preload="auto"></audio>
<audio id="snd-kyukyu" src="kyukyu.mp3" preload="auto"></audio>
<audio id="snd-kasai" src="kasaisirei.mp3" preload="auto"></audio>

<table class="grid-table" id="grid-table"></table>

<div class="lower-container">
    <div class="map-area">
        <img id="map-display" src="https://cyberjapandata.gsi.go.jp/xyz/std/12/3638/1614.png" alt="地図" class="map-img">
        <label class="map-controls">地図選択<input type="file" style="display:none;" onchange="loadCustomMap(this)"></label>
    </div>

    <div class="memo-pad-area">
        <div class="memo-title-bar">
            <span class="memo-title">✍️ 現場指揮・入電聴取リアルタイム手書きメモ</span>
            <button class="btn-clear-memo" onclick="clearMemoCanvas()">全消去</button>
        </div>
        <canvas id="memo-canvas"></canvas>
    </div>

    <div class="controls-panel">
        <div class="caller-info-bar">
            <div class="info-input-row">
                <div class="info-label">通報者</div>
                <div class="info-val-box">共同通信・一般入電</div>
                <div class="info-label" style="width:50px;">状態</div>
                <div class="info-val-box" style="width:50px; color:#0070c0; flex-grow:0; text-align:center;">接続</div>
            </div>
            <div class="info-input-row">
                <div class="info-label">通報住所</div>
                <div class="info-val-box" id="live-address-display">すくば市学園都市 付近</div>
            </div>
            <div class="info-input-row" style="margin-bottom:0;">
                <div class="info-label">方式等</div>
                <div class="info-val-box" style="color:#bf9000;">携帯電話 誤差範囲80m</div>
            </div>
        </div>

        <div>
            <div class="quick-input-box">
                <span class="label-text" style="color:#2c3e50;">✍️ 現場特記・臨時メモ（ここに入力した文字もアナウンスされます）</span>
                <input type="text" id="quickMemoText" placeholder="例：東山4は付近で待機中 / 傷病者1名追加の模様">
            </div>

            <div class="form-row">
                <div class="setting-item">
                    <span class="label-text">司令区分</span>
                    <select id="cmdType">
                        <option value="救急司令">救急司令</option>
                        <option value="火災司令">火災司令</option>
                        <option value="救助司令">救助司令</option>
                        <option value="災害司令">災害司令</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span class="label-text">町名・場所</span>
                    <select id="townName" onchange="syncDramaAddress()">
                        <option value="学園都市">学園都市</option>
                        <option value="すくば駅通り">すくば駅通り</option>
                        <option value="新都市中央通り">新都市中央通り</option>
                        <option value="学園都市駅通り">学園都市駅通り</option>
                        <option value="研究学園都市">研究学園都市</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="setting-item">
                    <span class="label-text">丁目・付加</span>
                    <select id="blockNum" onchange="syncDramaAddress()">
                        <option value="付近">付近</option>
                        <option value="一丁目付近">一丁目付近</option>
                        <option value="二丁目付近">二丁目付近</option>
                        <option value="三丁目付近">三丁目付近</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span class="label-text">自由入力詳細</span>
                    <input type="text" id="freeText" placeholder="内容（例：東山4出向中）">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn-stop" onclick="stopDispatchPrompt()">停止</button>
                <button class="btn-dispatch" onclick="startDispatch()">出動決定</button>
            </div>
        </div>

        <div class="bottom-sub-panel">
            <div class="drama-section-title">種別 － 1</div>
            
            <div class="category-group">
                <div class="cat-label-inline">救急カテゴリー</div>
                <button class="btn-cat selected" id="cat-ap" onclick="selectCategory('A+')">A+</button>
                <button class="btn-cat" id="cat-a" onclick="selectCategory('A')">A</button>
                <button class="btn-cat" id="cat-b" onclick="selectCategory('B')">B</button>
            </div>

            <div class="drama-sub-title">救急</div>
            
            <div class="factor-grid">
                <button class="btn-factor" onclick="setFactor('救急司令', '急病通報、対象者意識朦朧の模様')">急病</button>
                <button class="btn-factor" onclick="setFactor('救急司令', '労働災害事故、機械に挟まれ負傷模様')">労働災害</button>
                <button class="btn-factor" onclick="setFactor('救急司令', '医師運搬要請、医療資器材同乗搬送')">医師運搬</button>
                
                <button class="btn-factor" onclick="setFactor('救急司令', '交通事故、複数名負傷の模様')">交通事象</button>
                <button class="btn-factor" onclick="setFactor('救急司令', '運動競技中の事故、負傷者1名模様')">運動競技</button>
                <button class="btn-factor" onclick="setFactor('救急司令', '救急資器材搬送、現場へ急行')">資器材</button>
                
                <button class="btn-factor" onclick="setFactor('救急司令', '一般負傷、高所からの転落の模様')">一般負傷</button>
                <button class="btn-factor" onclick="setFactor('救急司令', '転院搬送依頼、医師同乗にて病院間搬送')">転院</button>
                <button class="btn-factor" onclick="setFactor('救急司令', '加害（暴行）事案、対象者出血の模様')">加害</button>
                
                <button class="btn-factor fire-factor" onclick="setFactor('火災司令', '建物火災通報、黒煙噴出中')">建物火災</button>
                <button class="btn-factor fire-factor" onclick="setFactor('救助司令', '一般救助出動、要救助者あり')">一般救助</button>
                <button class="btn-factor fire-factor" onclick="setFactor('災害司令', 'その他の災害出動、現着確認せよ')">その他災害</button>
            </div>

            <div class="dispatch-monitor-screen" id="dispatch-monitor">
                <div class="monitor-row" style="color: #666; font-size:11px;">[状況] 全部隊正常待機中。</div>
            </div>

            <div class="weather-monitor-screen">
                <span>すくば市消防本部</span>
                <span>晴れ / 北西2m / 40%【乾燥注意】</span>
            </div>
        </div>
    </div>
</div>

<script>
    var data = [
        { station: "中央", units: ["高救11", "高救12", "一救14", "二救8", "中タ34", "中ポ4", "中指2"] },
        { station: "並木", units: ["並指6", "並ポ64", "並救13", "並タ9", "並一救16"] },
        { station: "南谷", units: ["南2", "南救4", "南谷6"] },
        { station: "東山", units: ["東5", "東9", "東4", "東救1"] }
    ];

    var dispatchCount = 0; var activeDispatches = {}; var colorList = ['#0044cc', '#008800', '#ff6600', '#ddcc00'];
    var currentCategory = "A+"; var currentAnswer = 0; var timerIntervalId = null;
    var table = document.getElementById('grid-table');

    // 車両グリッド生成
    for (var g = 0; g < data.length; g++) {
        var group = data[g]; var allCells = [{ text: group.station, isStation: true }];
        for (var u = 0; u < group.units.length; u++) { allCells.push({ text: group.units[u], isStation: false }); }
        var fill = 5 - (allCells.length % 5); if (fill < 5 && fill > 0) { for (var f = 0; f < fill; f++) { allCells.push({ text: "", isStation: false, isEmpty: true }); } }
        var currentRow;
        for (var i = 0; i < allCells.length; i++) {
            if (i % 5 === 0) { currentRow = table.insertRow(-1); }
            var cellData = allCells[i]; var td = currentRow.insertCell(-1); td.className = "cell"; td.innerHTML = cellData.text;
            if (cellData.isStation) { td.className = "cell cell-station"; }
            else if (cellData.isEmpty) { td.style.backgroundColor = "#fafafa"; td.style.border = "1px dashed #eee"; }
            else { td.onclick = (function(targetTd) { return function() { if (targetTd.getAttribute('data-dispatch-id')) return; targetTd.className = (targetTd.className.indexOf('active') !== -1) ? "cell" : "cell active"; }; })(td); }
        }
    }

    // 手書きキャンバスの制御スクリプト
    var canvas = document.getElementById('memo-canvas');
    var ctx = canvas.getContext('2d');
    var isDrawing = false;

    function initCanvasSize() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        ctx.strokeStyle = '#00ff00'; 
        ctx.lineWidth = 2.5;         
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }
    window.onload = function() { initCanvasSize(); };
    window.onresize = function() { initCanvasSize(); };

    function getEventPos(e) {
        var rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        } else {
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }
    }

    function startDraw(e) { isDrawing = true; var pos = getEventPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); }
    function moveDraw(e) { if (!isDrawing) return; var pos = getEventPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); }
    function endDraw() { isDrawing = false; }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    window.addEventListener('mouseup', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', moveDraw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    function clearMemoCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function syncDramaAddress() {
        var town = document.getElementById('townName').value;
        var block = document.getElementById('blockNum').value;
        document.getElementById('live-address-display').innerText = "すくば市" + town + " " + block;
    }

    function selectCategory(cat) {
        currentCategory = cat; document.querySelectorAll('.btn-cat').forEach(function(btn){ btn.classList.remove('selected'); });
        if(cat === "A+") document.getElementById('cat-ap').classList.add('selected');
        if(cat === "A") document.getElementById('cat-a').classList.add('selected');
        if(cat === "B") document.getElementById('cat-b').classList.add('selected');
    }
    
    function setFactor(type, detail) { document.getElementById('cmdType').value = type; document.getElementById('freeText').value = detail; }
    function formatTime(seconds) { var m = Math.floor(seconds / 60); var s = seconds % 60; return (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s); }
    function setUnitArrived(id) { if (activeDispatches[id]) { activeDispatches[id].isArrived = true; updateMonitorDisplay(); } }
    
    function startGlobalTimerLoop() {
        if (timerIntervalId !== null) return;
        timerIntervalId = setInterval(function() {
            var hasActive = false;
            for (var id in activeDispatches) { if (activeDispatches.hasOwnProperty(id)) { if (!activeDispatches[id].isArrived) activeDispatches[id].seconds++; hasActive = true; } }
            if (hasActive) updateMonitorDisplay(); else { clearInterval(timerIntervalId); timerIntervalId = null; }
        }, 1000);
    }

    document.body.addEventListener('touchstart', function() {
        if (window.speechSynthesis) { var u = new SpeechSynthesisUtterance(''); window.speechSynthesis.speak(u); }
    }, {once: true});

    function updateMonitorDisplay() {
        var mScreen = document.getElementById('dispatch-monitor'); var html = ""; var hasActive = false;
        for (var id in activeDispatches) {
            if (activeDispatches.hasOwnProperty(id)) {
                hasActive = true; var item = activeDispatches[id]; var timeStr = formatTime(item.seconds);
                if (item.isArrived) html += "<div class='monitor-row' style='color: #ff3333;'><span>🚨[現着]" + id + item.label + "</span><span>⚡" + timeStr + "</span></div>";
                else html += "<div class='monitor-row'><span>▶[出動]" + id + item.label + " ⏱️" + timeStr + "</span><button class='btn-arrived' onclick='setUnitArrived(" + id + ")'>現着</button></div>";
            }
        }
        if (!hasActive) html = "<div class='monitor-row' style='color: #666; font-size:11px;'>[状況] 全部隊正常待機中。</div>";
        mScreen.innerHTML = html;
    }

    function startDispatch() {
        var allTds = table.getElementsByTagName('td'); var selectedElements = []; var selectedUnits = [];
        for (var d = 0; d < allTds.length; d++) { if (allTds[d].className.indexOf('active') !== -1) { selectedElements.push(allTds[d]); selectedUnits.push(allTds[d].innerText || allTds[d].textContent || ""); } }
        if (selectedUnits.length === 0) return;

        dispatchCount++; var dispatchColor = colorList[(dispatchCount - 1) % 4];
        var cmd = document.getElementById('cmdType').value; var town = document.getElementById('townName').value;
        var block = document.getElementById('blockNum').value; var free = document.getElementById('freeText').value;
        
        // ✍️ 常設メモに入力された文字を取得
        var quickMemo = document.getElementById('quickMemoText').value;

        // 音声合成用のテキスト（常設メモがあればそれも合体させる）
        var speechText = "カテゴリー" + currentCategory + "。" + cmd + "。" + town + "、" + block + "。" + free + "。";
        if (quickMemo !== "") {
            speechText += quickMemo + "。";
        }
        speechText += "出動部隊、" + selectedUnits.join("、") + "。以上。";

        activeDispatches[dispatchCount] = { label: "-[" + currentCategory + " " + town + "]", elements: selectedElements, seconds: 0, isArrived: false };

        updateMonitorDisplay(); startGlobalTimerLoop();

        var audioSirei = document.getElementById('snd-sirei'); var audioKyukyu = document.getElementById('snd-kyukyu'); var audioKasai = document.getElementById('snd-kasai');
        try { audioSirei.pause(); audioSirei.currentTime = 0; audioKyukyu.pause(); audioKyukyu.currentTime = 0; audioKasai.pause(); audioKasai.currentTime = 0; } catch(e){}
        if (window.speechSynthesis) window.speechSynthesis.cancel();

        var activeAudio = (cmd === "救急司令") ? audioKyukyu : ((cmd === "救助司令" || cmd === "災害司令") ? audioKasai : audioSirei);
        
        try { 
            activeAudio.play();
            setTimeout(function() { playSpeech(speechText); }, 1200);
        } catch(e){ 
            playSpeech(speechText); 
        }

        for (var s = 0; s < selectedElements.length; s++) { var el = selectedElements[s]; el.className = "cell"; el.style.backgroundColor = dispatchColor; el.style.color = '#ffffff'; el.setAttribute('data-dispatch-id', dispatchCount); }
    }

    function playSpeech(text) { if ('speechSynthesis' in window) { var uttr = new SpeechSynthesisUtterance(text); uttr.lang = 'ja-JP'; uttr.rate = 1.3; window.speechSynthesis.speak(uttr); } }

    function stopDispatchPrompt() {
        var keys = []; for (var k in activeDispatches) { if (activeDispatches.hasOwnProperty(k)) keys.push(k); }
        var message = "事案番号を入力。\n\n"; for (var i = 0; i < keys.length; i++) { message += "[" + keys[i] + "]" + activeDispatches[keys[i]].label + "\n"; }
        var inputId = prompt(message, ""); if (inputId === null || inputId === "") return;

        if (inputId === "7777") { document.getElementById('system-down-overlay').style.display = 'block'; generatePuzzle(); return; }

        if (inputId === "全停止") {
            var allTds = table.getElementsByTagName('td');
            for (var m = 0; m < allTds.length; m++) { if (allTds[m].getAttribute('data-dispatch-id')) { allTds[m].style.backgroundColor = '#ffffff'; allTds[m].style.color = '#000000'; allTds[m].removeAttribute('data-dispatch-id'); } }
            activeDispatches = {}; updateMonitorDisplay(); return;
        }

        if (activeDispatches[inputId]) {
            var elementsToReset = activeDispatches[inputId].elements;
            for (var r = 0; r < elementsToReset.length; r++) { var el = elementsToReset[r]; el.style.backgroundColor = '#ffffff'; el.style.color = '#000000'; el.removeAttribute('data-dispatch-id'); }
            delete activeDispatches[inputId]; updateMonitorDisplay();
        }
    }

    function generatePuzzle() { var num1 = Math.floor(Math.random()*8)+2; var num2 = Math.floor(Math.random()*8)+2; document.getElementById('puzzle-q-display').innerText = num1 + " ✕ " + num2 + " ＝ ？"; currentAnswer = num1 * num2; }
    function checkPuzzleAnswer() { if (parseInt(document.getElementById('puzzle-ans-input').value,10)===currentAnswer){ document.getElementById('system-down-overlay').style.display='none'; document.getElementById('puzzle-ans-input').value=''; } else { alert("演算エラー"); generatePuzzle();} }
    function loadCustomMap(input) { if (input.files && input.files[0]) { var reader = new FileReader(); reader.onload = function(e){ document.getElementById('map-display').src=e.target.result; }; reader.readAsDataURL(input.files[0]); } }
</script>
</body>
</html>
