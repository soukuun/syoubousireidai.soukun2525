<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すくば市消防本部 指令台システム - クレジット版</title>
    <style>
        :root {
            --bg-white: #ffffff;
            --panel-gray: #f5f5f5;
            --border-line: #bbbbbb;
            --text-black: #000000;
            --active-red: #ff3333;
            --dispatched-gray: #d0d0d0;
        }

        * {
            box-sizing: border-box;
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
        }

        body {
            background-color: var(--panel-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            margin: 0;
            padding: 8px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: var(--text-black);
            user-select: none;
            overflow: hidden;
        }

        /* 5列均等車両配置盤 */
        .grid-container {
            height: 42%;
            background-color: var(--bg-white);
            display: -ms-grid;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-auto-rows: 1fr;
            gap: 3px;
            border: 2px solid var(--border-line);
            padding: 4px;
            overflow-y: auto;
            margin-bottom: 8px;
        }

        .cell {
            background-color: var(--bg-white);
            color: var(--text-black);
            border: 1px solid #cccccc;
            
            display: flex;
            align-items: center;
            justify-content: center;
            display: -webkit-flex;
            -webkit-align-items: center;
            -webkit-justify-content: center;
            
            text-align: center;
            cursor: pointer;
            
            font-size: 13px; 
            font-weight: bold;
            line-height: 1.2;
            padding: 4px;
            white-space: normal;
            word-break: break-all;
        }

        .cell-station {
            background-color: #e0e0e0;
            color: #000000;
            cursor: default;
            border: 1px solid #999999;
            font-size: 14px;
        }

        .cell.active {
            background-color: var(--active-red);
            color: #ffffff;
            animation: blinkEffect 0.5s infinite alternate;
            -webkit-animation: blinkEffect 0.5s infinite alternate;
        }

        @keyframes blinkEffect {
            from { background-color: #ff3333; }
            to { background-color: #a00000; }
        }
        @-webkit-keyframes blinkEffect {
            from { background-color: #ff3333; }
            to { background-color: #a00000; }
        }

        /* 下部エリア */
        .lower-container {
            height: 55%;
            display: flex;
            display: -webkit-flex;
            gap: 8px;
        }

        .map-area {
            width: 35%;
            background-color: #e0e0e0;
            border: 2px solid var(--border-line);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .map-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #ccc;
        }
        
        .map-controls {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(255,255,255,0.9);
            padding: 4px 8px;
            border: 1px solid #999;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .controls-panel {
            flex-grow: 1;
            background-color: var(--bg-white);
            border: 2px solid var(--border-line);
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, auto) auto 1fr; /* クレジット用の行を追加 */
            gap: 10px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label-text {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        select, input {
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid var(--border-line);
            background: white;
            color: var(--text-black);
            width: 100%;
            box-sizing: border-box;
        }

        .setting-item.wide {
            grid-column: span 2;
        }

        /* 音声素材クレジット用のスタイル */
        .credit-area {
            grid-column: span 2;
            text-align: right;
            font-size: 11px;
            color: #777777;
            font-weight: bold;
            padding-top: 2px;
        }

        .credit-area a {
            color: #0066cc;
            text-decoration: none;
        }

        .credit-area a:hover {
            text-decoration: underline;
        }

        .dispatch-btn-container {
            grid-column: span 2;
            display: flex;
            display: -webkit-flex;
            align-items: flex-end;
            -webkit-align-items: flex-end;
        }

        .btn-dispatch {
            background-color: var(--bg-white);
            color: black;
            border: 4px solid #666;
            width: 100%;
            height: 80px;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }

        .btn-dispatch:active {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

<audio id="snd-sirei" src="sirei.mp3" preload="auto"></audio>
<audio id="snd-kyukyu" src="kyukyu.mp3" preload="auto"></audio>
<audio id="snd-kasai" src="kasaisirei.mp3" preload="auto"></audio>

<div class="grid-container" id="grid"></div>

<div class="lower-container">
    <div class="map-area">
        <img id="map-display" src="https://cyberjapandata.gsi.go.jp/xyz/std/12/3638/1614.png" alt="地図" class="map-img">
        <label class="map-controls">
            地図画像を選択
            <input type="file" id="map-input" accept="image/*" style="display:none;" onchange="loadCustomMap(this)">
        </label>
    </div>

    <div class="controls-panel">
        <div class="setting-item">
            <span class="label-text">司令区分</span>
            <select id="cmdType">
                <option value="火災司令">火災司令</option>
                <option value="救急司令">救急司令</option>
                <option value="救助司令">救助司令</option>
                <option value="災害司令">災害司令</option>
                <option value="その他">その他</option>
            </select>
        </div>
        <div class="setting-item">
            <span class="label-text">町名・場所</span>
            <select id="townName">
                <option value="学園都市">学園都市</option>
                <option value="蔓崎">蔓崎</option>
                <option value="研究学園都市">研究学園都市</option>
                <option value="新都市中央通り">新都市中央通り</option>
                <option value="すくば駅通り">すくば駅通り</option>
            </select>
        </div>
        <div class="setting-item">
            <span class="label-text">丁目</span>
            <select id="blockNum">
                <option value="">（なし）</option>
                <option value="一丁目">一丁目</option>
                <option value="二丁目">二丁目</option>
                <option value="三丁目">三丁目</option>
                <option value="四丁目">四丁目</option>
                <option value="五丁目">五丁目</option>
            </select>
        </div>
        <div class="setting-item">
            <span class="label-text">付加情報</span>
            <select id="nearBy">
                <option value="">（なし）</option>
                <option value="付近">付近</option>
            </select>
        </div>
        <div class="setting-item wide">
            <span class="label-text">自由入力詳細</span>
            <input type="text" id="freeText" placeholder="内容を入力">
        </div>

        <div class="credit-area">
            指令音素材提供：<a href="https://pocket-se.info/" target="_blank" rel="noopener noreferrer">ポケットサウンド/効果音素材</a>
        </div>

        <div class="dispatch-btn-container">
            <button class="btn-dispatch" onclick="startDispatch()">出動決定</button>
        </div>
    </div>
</div>

<script>
    const data = [
        {
            station: "中央署",
            units: ["高度救助隊11", "高度救助隊12", "第一救急隊 14", "第二救急隊 8", "中央タンク34", "中央ポンプ4", "中央指揮2"]
        },
        {
            station: "並木分署",
            units: ["並木指揮6", "並木ポンプ64", "並木高度救助隊 13", "並木タンク9", "並木第一救急隊 16", "並木第二救急隊 14"]
        }
    ];

    const grid = document.getElementById('grid');
    
    data.forEach(group => {
        const sCell = document.createElement('div');
        sCell.className = 'cell cell-station';
        sCell.innerText = group.station;
        grid.appendChild(sCell);
        
        group.units.forEach(u => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = u;
            cell.onclick = () => {
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                document.getElementById('snd-sirei').play().catch(()=>{});
                document.getElementById('snd-sirei').pause();
                
                cell.classList.toggle('active');
            };
            grid.appendChild(cell);
        });
        
        let fill = 5 - ((group.units.length + 1) % 5);
        if (fill < 5 && fill > 0) {
            for(let i=0; i<fill; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'cell';
                emptyCell.style.backgroundColor = '#fafafa';
                emptyCell.style.border = '1px dashed #eee';
                emptyCell.style.cursor = 'default';
                grid.appendChild(emptyCell);
            }
        }
    });

    function loadCustomMap(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('map-display').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function startDispatch() {
        const selectedElements = document.querySelectorAll('.cell.active');
        const selectedUnits = Array.from(selectedElements).map(el => el.innerText);
        
        if (selectedUnits.length === 0) return;

        const cmd = document.getElementById('cmdType').value;
        const town = document.getElementById('townName').value;
        const block = document.getElementById('blockNum').value;
        const near = document.getElementById('nearBy').value;
        const free = document.getElementById('freeText').value;

        const address = `すくば市、${town}、${block}${near}`;
        const speechText = `${cmd}。${address}。${free}。出動部隊、${selectedUnits.join("、")}。以上。`;

        const audioSirei = document.getElementById('snd-sirei');
        const audioKyukyu = document.getElementById('snd-kyukyu');
        const audioKasai = document.getElementById('snd-kasai');
        
        [audioSirei, audioKyukyu, audioKasai].forEach(a => {
            a.pause();
            a.currentTime = 0;
        });

        if (window.speechSynthesis) window.speechSynthesis.cancel();

        let activeAudio = audioSirei;
        
        if (cmd === "救急司令") {
            activeAudio = audioKyukyu;
        } else if (cmd === "救助司令" || cmd === "災害司令") {
            activeAudio = audioKasai;
        } else {
            activeAudio = audioSirei;
        }

        activeAudio.play().then(() => {
            activeAudio.onended = function() {
                if ('speechSynthesis' in window) {
                    const uttr = new SpeechSynthesisUtterance(speechText);
                    uttr.lang = 'ja-JP';
                    uttr.rate = 1.25;
                    window.speechSynthesis.speak(uttr);
                }
            };
        }).catch(err => {
            if ('speechSynthesis' in window) {
                const uttr = new SpeechSynthesisUtterance(speechText);
                uttr.lang = 'ja-JP';
                uttr.rate = 1.25;
                window.speechSynthesis.speak(uttr);
            }
        });

        selectedElements.forEach(el => {
            el.classList.remove('active');
            el.style.backgroundColor = '#d0d0d0';
            el.style.color = "#666666";
        });
    }
</script>
</body>
</html>
