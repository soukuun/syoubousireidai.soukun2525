<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>すくば市消防本部 指令台システム</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body {
            background-color: #f4f6f9;
            font-family: "Helvetica Neue", Arial, "Meiryo", "MS PGothic", sans-serif;
            margin: 0; padding: 8px; height: 100vh; color: #000000; overflow: hidden; position: relative;
            box-sizing: border-box;
        }
        /* 車両配置図（上部） */
        .grid-table {
            width: 100%; height: 25%; border-collapse: separate; border-spacing: 2px;
            background-color: #ffffff; border: 1px solid #b0b0b0; margin-bottom: 4px; table-layout: fixed;
        }
        .cell {
            background-color: #ffffff; color: #000000; border: 1px solid #d0d0d0;
            text-align: center; vertical-align: middle; cursor: pointer;
            font-size: 11px; font-weight: bold; padding: 2px; word-break: break-all;
        }
        .cell-station { background-color: #e6e6e6; color: #000000; cursor: default; border: 1px solid #a0a0a0; font-size: 11px; }
        .cell.active {
            background-color: #ff3333 !important; color: #ffffff !important;
            animation: blinkEffect 0.5s infinite alternate;
        }
        @keyframes blinkEffect { from { background-color: #ff3333; } to { background-color: #900000; } }
        
        /* 下部エリアレイアウト */
        .lower-container { height: 65%; display: flex; gap: 6px; }
        .map-area { width: 30%; background-color: #d8d8d8; border: 1px solid #b0b0b0; position: relative; text-align: center; }
        .map-img { width: 100%; height: 100%; object-fit: contain; }
        .map-controls { position: absolute; bottom: 5px; left: 5px; background: #ffffff; padding: 4px 8px; border: 1px solid #999; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        .controls-panel { width: 70%; flex-grow: 1; background-color: #ffffff; border: 1px solid #b0b0b0; padding: 6px; display: flex; flex-direction: column; justify-content: space-between; overflow-y: auto; box-sizing: border-box; }
        
        /* 最上部通報者情報エリア */
        .caller-info-bar {
            background-color: #dae3f3; padding: 4px; border: 1px solid #aebeea; margin-bottom: 6px; font-size: 11px;
        }
        .info-input-row { display: flex; gap: 4px; margin-bottom: 3px; align-items: center; }
        .info-label { background: #b4c6e7; padding: 2px 6px; font-weight: bold; width: 65px; text-align: center; border: 1px solid #8faadc; font-size: 10px; }
        .info-val-box { background: white; border: 1px solid #a6a6a6; padding: 2px 4px; flex-grow: 1; font-weight: bold; font-size: 11px; height: 16px; }

        /* 入力行 */
        .form-row { margin-bottom: 4px; display: flex; gap: 6px; }
        .setting-item { flex: 1; }
        .label-text { font-size: 11px; font-weight: bold; color: #444; display: block; margin-bottom: 1px; }
        select, input { padding: 3px; font-size: 11px; font-weight: bold; border: 1px solid #a6a6a6; background: white; color: #000000; width: 100%; box-sizing: border-box; }
        
        /* ボタンエリア */
        .btn-container { width: 100%; display: flex; gap: 6px; margin-top: 2px; margin-bottom: 4px; }
        .btn-stop { background-color: #fce4d6; color: #c65911; border: 2px solid #c65911; width: 25%; height: 36px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-dispatch { background-color: #ffffff; color: #000000; border: 2px solid #595959; width: 75%; height: 36px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .bottom-sub-panel { border-top: 1px dashed #b0b0b0; padding-top: 4px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* 見出しタイトル */
        .drama-section-title { font-size: 14px; font-weight: bold; color: #333333; margin: 2px 0; border-bottom: 2px solid #4472c4; padding-bottom: 1px; }
        
        /* 詳細記入欄（背景白・文字黒） */
        .custom-write-area {
            flex-grow: 1; display: flex; flex-direction: column; margin-bottom: 4px; min-height: 50px;
        }
        .custom-textarea {
            width: 100%; flex-grow: 1; background-color: #ffffff; color: #000000; 
            border: 2px solid #4472c4; border-radius: 4px; padding: 6px; 
            font-size: 13px; font-weight: bold; box-sizing: border-box; resize: none;
            font-family: inherit;
        }
        
        /* タイマーモニター */
        .dispatch-monitor-screen { background-color: #111111; border: 1px solid #333; height: 38px; padding: 4px; overflow-y: auto; font-family: monospace; margin-bottom: 4px; }
        .monitor-row { font-size: 11px; font-weight: bold; color: #00ff00; margin-bottom: 1px; line-height: 14px; }
        .btn-arrived { float: right; background-color: #333; color: #ffff00; border: 1px solid #ffff00; font-size: 9px; padding: 0 3px; cursor: pointer; height: 13px; }

        /* 気象盤 */
        .weather-monitor-screen { background-color: #f2f2f2; color: #333; font-size: 10px; font-weight: bold; padding: 2px 4px; border: 1px solid #d9d9d9; display: flex; justify-content: space-between; }
        
        /* 📸 画像2枚目の「クレジット表記用エリア」のCSSを完全ドッキング！ */
        .credit-area { margin-top: 6px; padding: 8px; background: #222; border: 1px solid #444; text-align: center; font-size: 11px; color: #888; }
        .dev-name { color: #ffcc00; font-size: 12px; font-weight: bold; }

        /* システムダウン */
        .server-down-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; color: #ff3333; z-index: 99999; text-align: center; padding-top: 10%; }
        .puzzle-box { background-color: #111111; border: 2px solid #ff3333; width: 300px; margin: 0 auto; padding: 15px; color: #ffffff; }
        .puzzle-question { font-size: 24px; font-weight: bold; color: #ffff00; }
        .puzzle-input { width: 100px; font-size: 18px; text-align: center; background: #222; color: #fff; border: 1px solid #555; }
    </style>
</head>
<body>

<div id="system-down-overlay" class="server-down-screen">
    <div style="font-size:24px; font-weight:bold; margin-bottom:15px;">🚨司令システムダウン🚨</div>
    <div class="puzzle-box">
        <div style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">【緊急復旧バイパス演算】</div>
        <div id="puzzle-q-display" class="puzzle-question">3 × 2 = ?</div>
        <form onsubmit="checkPuzzleAnswer(); return false;" style="margin:0;">
            <input type="text" id="puzzle-ans-input" class="puzzle-input" autocomplete="off">
            <button type="button" style="padding:4px 10px; background:#ff3333; color:white; border:none;" onclick="checkPuzzleAnswer()">送信</button>
        </form>
    </div>
</div>

<audio id="snd-sirei" src="sirei.mp3" preload="auto"></audio>
<audio id="snd-kyukyu" src="kyukyu.mp3" preload="auto"></audio>
<audio id="snd-kasai" src="kasaisirei.mp3" preload="auto"></audio>

<table class="grid-table" id="grid-table"></table>

<div class="lower-container">
    <div class="map-area">
        <img id="map-display" src="https://cyberjapandata.gsi.go.jp/xyz/std/12/3638/1614.png" alt="地図" class="map-img">
        <label class="map-controls">地図選択<input type="file" style="display:none;" onchange="loadCustomMap(this)"></label>
    </div>

    <div class="controls-panel">
        <div class="caller-info-bar">
            <div class="info-input-row">
                <div class="info-label">通報者</div>
                <div class="info-val-box">共同通信・一般入電</div>
                <div class="info-label" style="width:50px;">回線状態</div>
                <div class="info-val-box" style="width:70px; color:#0070c0; flex-grow:0;">接続中</div>
            </div>
            <div class="info-input-row">
                <div class="info-label">通報住所</div>
                <div class="info-val-box" id="live-address-display">すくば市学園都市 付近</div>
            </div>
            <div class="info-input-row" style="margin-bottom:0;">
                <div class="info-label">方式等</div>
                <div class="info-val-box" style="color:#bf9000;">携帯電話 誤差範囲80m 高度m</div>
            </div>
        </div>

        <div>
            <div class="form-row">
                <div class="setting-item">
                    <span class="label-text">司令区分</span>
                    <select id="cmdType">
                        <option value="救急司令">救急司令</option>
                        <option value="火災司令">火災司令</option>
                        <option value="救助司令">救助司令</option>
                        <option value="災害司令">災害司令</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span class="label-text">町名・場所</span>
                    <select id="townName" onchange="syncDramaAddress()">
                        <option value="学園都市">学園都市</option>
                        <option value="すくば駅通り">すくば駅通り</option>
                        <option value="新都市中央通り">新都市中央通り</option>
                        <option value="学園都市駅通り">学園都市駅通り</option>
                        <option value="研究学園都市">研究学園都市</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="setting-item">
                    <span class="label-text">丁目・付加</span>
                    <select id="blockNum" onchange="syncDramaAddress()">
                        <option value="付近">付近</option>
                        <option value="一丁目付近">一丁目付近</option>
                        <option value="二丁目付近">二丁目付近</option>
                        <option value="三丁目付近">三丁目付近</option>
                    </select>
                </div>
                <div class="setting-item">
                    <span class="label-text">自由入力詳細</span>
                    <input type="text" id="freeText" placeholder="内容を入力（例：東山4出向中、など）">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn-stop" onclick="stopDispatchPrompt()">司令停止</button>
                <button class="btn-dispatch" onclick="startDispatch()">出動決定</button>
            </div>
        </div>

        <div class="bottom-sub-panel">
            <div class="drama-section-title">事案詳細リアルタイム入力盤</div>
            
            <div class="custom-write-area">
                <textarea id="customMemoText" class="custom-textarea" placeholder="ここに現場の状況やメモを自由にタイピングしてください。入力した内容が出動時に読み上げられます。"></textarea>
            </div>

            <div class="dispatch-monitor-screen" id="dispatch-monitor">
                <div class="monitor-row" style="color: #666;">[状況] 現在、待機中の部隊はすべて正常運用です。</div>
            </div>

            <div class="weather-monitor-screen">
                <span>所属：すくば市消防本部</span>
                <span>気象：晴れ / 北西の風2m / 湿度40%【乾燥注意報】</span>
            </div>

            <div class="credit-area">
                システム開発者：<span class="dev-name">すくば市消防本部 指令課情報係</span>
            </div>
        </div>
    </div>
</div>

<script>
    var data = [
        { station: "中央署", units: ["高度救助隊11", "高度救助隊12", "第一救急隊 14", "第二救急隊 8", "中央タンク34", "中央ポンプ4", "中央指揮2"] },
        { station: "並木分署", units: ["並木指揮6", "並木ポンプ64", "並木高度救助隊 13", "並木タンク9", "並木第一救急隊 16"] },
        { station: "南谷出張所", units: ["南2", "南救急4", "南谷6"] },
        { station: "東山署", units: ["東山5", "東山9", "東山4", "東山救急1"] }
    ];

    var dispatchCount = 0; var activeDispatches = {}; var colorList = ['#0044cc', '#008800', '#ff6600', '#ddcc00'];
    var currentAnswer = 0; var timerIntervalId = null;
    var table = document.getElementById('grid-table');

    for (var g = 0; g < data.length; g++) {
        var group = data[g]; var allCells = [{ text: group.station, isStation: true }];
        for (var u = 0; u < group.units.length; u++) { allCells.push({ text: group.units[u], isStation: false }); }
        var fill = 5 - (allCells.length % 5); if (fill < 5 && fill > 0) { for (var f = 0; f < fill; f++) { allCells.push({ text: "", isStation: false, isEmpty: true }); } }
        var currentRow;
        for (var i = 0; i < allCells.length; i++) {
            if (i % 5 === 0) { currentRow = table.insertRow(-1); currentRow.style.height = "26px"; }
            var cellData = allCells[i]; var td = currentRow.insertCell(-1); td.className = "cell"; td.innerHTML = cellData.text;
            if (cellData.isStation) { td.className = "cell cell-station"; }
            else if (cellData.isEmpty) { td.style.backgroundColor = "#fafafa"; td.style.border = "1px dashed #eee"; }
            else { td.onclick = (function(targetTd) { return function() { if (targetTd.getAttribute('data-dispatch-id')) return; targetTd.className = (targetTd.className.indexOf('active') !== -1) ? "cell" : "cell active"; }; })(td); }
        }
    }

    // 📱 Apple & Android 音声セキュリティロック解除
    function unlockAudio() {
        var audios = [document.getElementById('snd-sirei'), document.getElementById('snd-kyukyu'), document.getElementById('snd-kasai')];
        audios.forEach(function(audio) {
            if (audio) {
                audio.play().then(function() { audio.pause(); audio.currentTime = 0; }).catch(function(e){});
            }
        });
        if (window.speechSynthesis) {
            var u = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(u);
        }
        window.removeEventListener('touchstart', unlockAudio);
        window.removeEventListener('mousedown', unlockAudio);
    }
    window.addEventListener('touchstart', unlockAudio);
    window.addEventListener('mousedown', unlockAudio);

    function syncDramaAddress() {
        var town = document.getElementById('townName').value;
        var block = document.getElementById('blockNum').value;
        document.getElementById('live-address-display').innerText = "すくば市" + town + " " + block;
    }
    
    function formatTime(seconds) { var m = Math.floor(seconds / 60); var s = seconds % 60; return (m < 10 ? "0" + m : m) + "分" + (s < 10 ? "0" + s : s) + "秒"; }
    function setUnitArrived(id) { if (activeDispatches[id]) { activeDispatches[id].isArrived = true; updateMonitorDisplay(); } }
    
    function startGlobalTimerLoop() {
        if (timerIntervalId !== null) return;
        timerIntervalId = setInterval(function() {
            var hasActive = false;
            for (var id in activeDispatches) { if (activeDispatches.hasOwnProperty(id)) { if (!activeDispatches[id].isArrived) activeDispatches[id].seconds++; hasActive = true; } }
            if (hasActive) updateMonitorDisplay(); else { clearInterval(timerIntervalId); timerIntervalId = null; }
        }, 1000);
    }

    function updateMonitorDisplay() {
        var mScreen = document.getElementById('dispatch-monitor'); var html = ""; var hasActive = false;
        for (var id in activeDispatches) {
            if (activeDispatches.hasOwnProperty(id)) {
                hasActive = true; var item = activeDispatches[id]; var timeStr = formatTime(item.seconds);
                if (item.isArrived) html += "<div class='monitor-row' style='color: #ff3333;'>🚨 【現着】事案" + id + item.label + "＝⚡" + timeStr + "</div>";
                else html += "<div class='monitor-row'><button class='btn-arrived' onclick='setUnitArrived(" + id + ")'>現着</button>▶ 【出動】事案" + id + item.label + "＝⏱️" + timeStr + "</div>";
            }
        }
        if (!hasActive) html = "<div class='monitor-row' style='color: #666;'>[状況] 現在、待機中の部隊はすべて正常運用です。</div>";
        mScreen.innerHTML = html;
    }

    function startDispatch() {
        var allTds = table.getElementsByTagName('td'); var selectedElements = []; var selectedUnits = [];
        for (var d = 0; d < allTds.length; d++) { if (allTds[d].className.indexOf('active') !== -1) { selectedElements.push(allTds[d]); selectedUnits.push(allTds[d].innerText || allTds[d].textContent || ""); } }
        if (selectedUnits.length === 0) return;

        dispatchCount++; var dispatchColor = colorList[(dispatchCount - 1) % 4];
        var cmd = document.getElementById('cmdType').value; var town = document.getElementById('townName').value;
        var block = document.getElementById('blockNum').value; var free = document.getElementById('freeText').value;

        var customMemoText = document.getElementById('customMemoText').value;

        var speechText = cmd + "。" + town + "、" + block + "。" + free + "。";
        if (customMemoText.trim() !== "") {
            speechText += customMemoText + "。";
        }
        speechText += "出動部隊、" + selectedUnits.join("、") + "。以上。";

        activeDispatches[dispatchCount] = { label: "-[" + town + "](" + selectedUnits.join(",") + ")", elements: selectedElements, seconds: 0, isArrived: false };

        updateMonitorDisplay(); startGlobalTimerLoop();

        var audioSirei = document.getElementById('snd-sirei'); var audioKyukyu = document.getElementById('snd-kyukyu'); var audioKasai = document.getElementById('snd-kasai');
        try { audioSirei.pause(); audioSirei.currentTime = 0; audioKyukyu.pause(); audioKyukyu.currentTime = 0; audioKasai.pause(); audioKasai.currentTime = 0; } catch(e){}
        if (window.speechSynthesis) window.speechSynthesis.cancel();

        // 🚨 司令区分に合わせて鳴らす音ファイルを切り替え
        var activeAudio = (cmd === "救急司令") ? audioKyukyu : ((cmd === "救助司令" || cmd === "災害司令") ? audioKasai : audioSirei);
        
        try { 
            activeAudio.play();
            setTimeout(function() {
                playSpeech(speechText);
            }, 1500);
        } catch(e){ 
            playSpeech(speechText); 
        }

        for (var s = 0; s < selectedElements.length; s++) { var el = selectedElements[s]; el.className = "cell"; el.style.backgroundColor = dispatchColor; el.style.color = '#ffffff'; el.setAttribute('data-dispatch-id', dispatchCount); }
    }

    function playSpeech(text) { 
        if ('speechSynthesis' in window) { 
            var uttr = new SpeechSynthesisUtterance(text); 
            uttr.lang = 'ja-JP'; 
            uttr.rate = 1.3; 
            window.speechSynthesis.speak(uttr); 
        } 
    }

    function stopDispatchPrompt() {
        var keys = []; for (var k in activeDispatches) { if (activeDispatches.hasOwnProperty(k)) keys.push(k); }
        var message = "事案番号を入力。\n\n"; for (var i = 0; i < keys.length; i++) { message += "[" + keys[i] + "]" + activeDispatches[keys[i]].label + "\n"; }
        var inputId = prompt(message, ""); if (inputId === null || inputId === "") return;

        if (inputId === "7777") { 
            document.getElementById('system-down-overlay').style.display = 'block'; 
            generatePuzzle(); 
            return; 
        }

        if (inputId === "全停止") {
            var allTds = table.getElementsByTagName('td');
            for (var m = 0; m < allTds.length; m++) { if (allTds[m].getAttribute('data-dispatch-id')) { allTds[m].style.backgroundColor = '#ffffff'; allTds[m].style.color = '#000000'; allTds[m].removeAttribute('data-dispatch-id'); } }
            activeDispatches = {}; updateMonitorDisplay(); return;
        }

        if (activeDispatches[inputId]) {
            var elementsToReset = activeDispatches[inputId].elements;
            for (var r = 0; r < elementsToReset.length; r++) { var el = elementsToReset[r]; el.style.backgroundColor = '#ffffff'; el.style.color = '#000000'; el.removeAttribute('data-dispatch-id'); }
            delete activeDispatches[inputId]; updateMonitorDisplay();
        }
    }

    function generatePuzzle() { var num1 = Math.floor(Math.random()*8)+2; var num2 = Math.floor(Math.random()*8)+2; document.getElementById('puzzle-q-display').innerText = num1 + " ✕ " + num2 + " ＝ ？"; currentAnswer = num1 * num2; }
    function checkPuzzleAnswer() { if (parseInt(document.getElementById('puzzle-ans-input').value,10)===currentAnswer){ document.getElementById('system-down-overlay').style.display='none'; document.getElementById('puzzle-ans-input').value=''; } else { alert("エラー"); generatePuzzle();} }
    function loadCustomMap(input) { if (input.files && input.files[0]) { var reader = new FileReader(); reader.onload = function(e){ document.getElementById('map-display').src=e.target.result; }; reader.readAsDataURL(input.files[0]); } }
</script>
</body>
</html>
