<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>すくば市消防本部 指令台システム - 世紀末互換版</title>
    <style>
        /* 最新ブラウザ用の基本設定 */
        :root {
            --bg-white: #ffffff;
            --panel-gray: #f5f5f5;
            --border-line: #bbbbbb;
            --text-black: #000000;
            --active-red: #ff3333;
        }

        * {
            box-sizing: border-box;
            -webkit-box-sizing: border-box;
            -moz-box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5; /* 95/XP用に直接カラー指定 */
            font-family: "MS UI Gothic", "MS PGothic", -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 8px;
            height: 100vh;
            color: #000000;
            overflow: hidden;
        }

        /* 95/XP（IE6）でも絶対に崩れない5列均等テーブル */
        .grid-table {
            width: 100%;
            height: 42%;
            border-collapse: separate;
            border-spacing: 3px;
            background-color: #ffffff;
            border: 2px solid #bbbbbb;
            margin-bottom: 8px;
            table-layout: fixed; /* これで5列が完全均等になります */
        }

        .cell {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #cccccc;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            font-size: 13px; 
            font-weight: bold;
            padding: 4px;
            word-break: break-all;
        }

        .cell-station {
            background-color: #e0e0e0;
            color: #000000;
            cursor: default;
            border: 1px solid #999999;
            font-size: 14px;
        }

        /* 選択中の赤点滅（対応ブラウザのみ） */
        .cell.active {
            background-color: #ff3333 !important;
            color: #ffffff !important;
            animation: blinkEffect 0.5s infinite alternate;
            -webkit-animation: blinkEffect 0.5s infinite alternate;
        }

        @keyframes blinkEffect {
            from { background-color: #ff3333; }
            to { background-color: #a00000; }
        }
        @-webkit-keyframes blinkEffect {
            from { background-color: #ff3333; }
            to { background-color: #a00000; }
        }

        /* 下部エリア（古いIE用にテーブルレイアウトと併用） */
        .lower-container {
            height: 54%;
            display: flex;
            display: -webkit-flex;
            gap: 8px;
        }

        .map-area {
            width: 35%;
            background-color: #e0e0e0;
            border: 2px solid #bbbbbb;
            position: relative;
            overflow: hidden;
            text-align: center;
        }
        
        .map-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #ccc;
        }
        
        .map-controls {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: #ffffff;
            padding: 4px 8px;
            border: 1px solid #999;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .controls-panel {
            width: 65%;
            flex-grow: 1;
            background-color: #ffffff;
            border: 2px solid #bbbbbb;
            padding: 10px;
        }

        /* 古いIEでも縦に並ぶように調整 */
        .form-row {
            margin-bottom: 8px;
            overflow: hidden;
        }

        .setting-item {
            float: left;
            width: 48%;
            margin-right: 2%;
        }

        .setting-item.wide {
            width: 100%;
            float: none;
            clear: both;
        }

        .label-text {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 2px;
        }

        select, input {
            padding: 6px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #bbbbbb;
            background: white;
            color: #000000;
            width: 100%;
        }

        .credit-area {
            text-align: right;
            font-size: 11px;
            color: #777777;
            font-weight: bold;
            margin-top: 5px;
            margin-bottom: 5px;
            clear: both;
        }

        .credit-area a {
            color: #0066cc;
            text-decoration: none;
        }

        .btn-dispatch {
            background-color: #ffffff;
            color: #000000;
            border: 4px solid #666666;
            width: 100%;
            height: 70px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<audio id="snd-sirei" src="sirei.mp3" preload="auto"></audio>
<audio id="snd-kyukyu" src="kyukyu.mp3" preload="auto"></audio>
<audio id="snd-kasai" src="kasaisirei.mp3" preload="auto"></audio>

<table class="grid-table" id="grid-table">
    </table>

<div class="lower-container">
    <div class="map-area">
        <img id="map-display" src="https://cyberjapandata.gsi.go.jp/xyz/std/12/3638/1614.png" alt="地図" class="map-img">
        <label class="map-controls">
            地図画像を選択
            <input type="file" id="map-input" accept="image/*" style="display:none;" onchange="loadCustomMap(this)">
        </label>
    </div>

    <div class="controls-panel">
        <div class="form-row">
            <div class="setting-item">
                <span class="label-text">司令区分</span>
                <select id="cmdType">
                    <option value="火災司令">火災司令</option>
                    <option value="救急司令">救急司令</option>
                    <option value="救助司令">救助司令</option>
                    <option value="災害司令">災害司令</option>
                    <option value="その他">その他</option>
                </select>
            </div>
            <div class="setting-item">
                <span class="label-text">町名・場所</span>
                <select id="townName">
                    <option value="学園都市">学園都市</option>
                    <option value="蔓崎">蔓崎</option>
                    <option value="研究学園都市">研究学園都市</option>
                    <option value="新都市中央通り">新都市中央通り</option>
                    <option value="すくば駅通り">すくば駅通り</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="setting-item">
                <span class="label-text">丁目</span>
                <select id="blockNum">
                    <option value="">（なし）</option>
                    <option value="一丁目">一丁目</option>
                    <option value="二丁目">二丁目</option>
                    <option value="三丁目">三丁目</option>
                    <option value="四丁目">四丁目</option>
                    <option value="五丁目">五丁目</option>
                </select>
            </div>
            <div class="setting-item">
                <span class="label-text">付加情報</span>
                <select id="nearBy">
                    <option value="">（なし）</option>
                    <option value="付近">付近</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="setting-item wide">
                <span class="label-text">自由入力詳細</span>
                <input type="text" id="freeText" placeholder="内容を入力">
            </div>
        </div>

        <div class="credit-area">
            指令音素材提供：<a href="https://pocket-se.info/" target="_blank">ポケットサウンド/効果音素材</a>
        </div>

        <button class="btn-dispatch" onclick="startDispatch()">出動決定</button>
    </div>
</div>

<script>
    // Windows 95/XPのIEでも100%エラーを吐かない古代のJavaScript表記（varとfunctionのみ）
    var data = [
        {
            station: "中央署",
            units: ["高度救助隊11", "高度救助隊12", "第一救急隊 14", "第二救急隊 8", "中央タンク34", "中央ポンプ4", "中央指揮2"]
        },
        {
            station: "並木分署",
            units: ["並木指揮6", "並木ポンプ64", "並木高度救助隊 13", "並木タンク9", "並木第一救急隊 16", "並木第二救急隊 14"]
        }
    ];

    var table = document.getElementById('grid-table');
    
    // データから1行5マスのテーブル行を生成
    for (var g = 0; g < data.length; g++) {
        var group = data[g];
        var allCells = [];
        
        // 署名を追加
        allCells.push({ text: group.station, isStation: true });
        
        // 車両を追加
        for (var u = 0; u < group.units.length; u++) {
            allCells.push({ text: group.units[u], isStation: false });
        }
        
        // 5列の倍数になるように空セルを追加
        var fill = 5 - (allCells.length % 5);
        if (fill < 5 && fill > 0) {
            for (var f = 0; f < fill; f++) {
                allCells.push({ text: "", isStation: false, isEmpty: true });
            }
        }
        
        // 実際にテーブルのtr、tdを組み立てる
        var currentRow;
        for (var i = 0; i < allCells.length; i++) {
            if (i % 5 === 0) {
                currentRow = table.insertRow(-1);
                // IE6用に高さを均等にするための計算
                currentRow.style.height = "50px";
            }
            
            var cellData = allCells[i];
            var td = currentRow.insertCell(-1);
            td.className = "cell";
            td.innerHTML = cellData.text;
            
            if (cellData.isStation) {
                td.className = "cell cell-station";
            } else if (cellData.isEmpty) {
                td.style.backgroundColor = "#fafafa";
                td.style.border = "1px dashed #eee";
                td.style.cursor = "default";
            } else {
                // 車両クリック時の処理（古代ブラウザ対応版）
                td.onclick = (function(targetTd) {
                    return function() {
                        if (window.speechSynthesis) window.speechSynthesis.cancel();
                        
                        // 効果音空再生ロック解除（対応環境用）
                        try {
                            document.getElementById('snd-sirei').play().catch(function(){});
                            document.getElementById('snd-sirei').pause();
                        } catch(e) {}
                        
                        // 青色（出動中）なら白に戻す
                        if (targetTd.style.backgroundColor === 'rgb(0, 68, 204)' || targetTd.style.backgroundColor === '#0044cc') {
                            targetTd.style.backgroundColor = '#ffffff';
                            targetTd.style.color = '#000000';
                            targetTd.className = "cell";
                        } else {
                            // 通常時は選択（赤）の切り替え
                            if (targetTd.className.indexOf('active') !== -1) {
                                targetTd.className = "cell";
                            } else {
                                targetTd.className = "cell active";
                            }
                        }
                    };
                })(td);
            }
        }
    }

    function loadCustomMap(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('map-display').src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function startDispatch() {
        // 選択された「active」マスの取得（古いブラウザでも回るループ処理）
        var allTds = table.getElementsByTagName('td');
        var selectedElements = [];
        var selectedUnits = [];
        
        for (var d = 0; d < allTds.length; d++) {
            if (allTds[d].className.indexOf('active') !== -1) {
                selectedElements.push(allTds[d]);
                selectedUnits.push(allTds[d].innerText || allTds[d].textContent || "");
            }
        }
        
        if (selectedUnits.length === 0) return;

        var cmd = document.getElementById('cmdType').value;
        var town = document.getElementById('townName').value;
        var block = document.getElementById('blockNum').value;
        var near = document.getElementById('nearBy').value;
        var free = document.getElementById('freeText').value;

        var address = "すくば市、" + town + "、" + block + near;
        var speechText = cmd + "。" + address + "。" + free + "。出動部隊、" + selectedUnits.join("、") + "。以上。";

        var audioSirei = document.getElementById('snd-sirei');
        var audioKyukyu = document.getElementById('snd-kyukyu');
        var audioKasai = document.getElementById('snd-kasai');
        
        // 音声リセット（古いブラウザでのエラー回避付き）
        try {
            audioSirei.pause(); audioSirei.currentTime = 0;
            audioKyukyu.pause(); audioKyukyu.currentTime = 0;
            audioKasai.pause(); audioKasai.currentTime = 0;
        } catch(e) {}

        if (window.speechSynthesis) window.speechSynthesis.cancel();

        var activeAudio = audioSirei;
        if (cmd === "救急司令") {
            activeAudio = audioKyukyu;
        } else if (cmd === "救助司令" || cmd === "災害司令") {
            activeAudio = audioKasai;
        }

        // 音声再生＆アナウンス（現代ブラウザ用処理）
        try {
            activeAudio.play().then(function() {
                activeAudio.onended = function() {
                    playSpeech(speechText);
                };
            }).catch(function(err) {
                playSpeech(speechText);
            });
        } catch(e) {
            // 95/XPのIEなどでplay()が動かない場合はそのままスルー
            playSpeech(speechText);
        }

        // 出動した車両を「青色」に染める
        for (var s = 0; s < selectedElements.length; s++) {
            var el = selectedElements[s];
            el.className = "cell"; // activeクラスを解除
            el.style.backgroundColor = '#0044cc';
            el.style.color = '#ffffff';
        }
    }

    function playSpeech(text) {
        if ('speechSynthesis' in window) {
            var uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = 'ja-JP';
            uttr.rate = 1.25;
            window.speechSynthesis.speak(uttr);
        }
    }
</script>
</body>
</html>
